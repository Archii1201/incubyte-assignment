spring:
  application:
    name: car-dealership-inventory
  datasource:
    url: jdbc:postgresql://localhost:5432/car_dealership_dev
    username: postgres
    password: Archi@1201
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns schema, never let Hibernate auto-migrate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8081
jwt:
  secret: ${JWT_SECRET:change-this-in-production-please-use-env-var}
  expiration-ms: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html